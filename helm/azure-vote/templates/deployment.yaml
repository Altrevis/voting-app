apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "azure-vote.fullname" . }}
  labels:
    {{- include "azure-vote.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "azure-vote.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "azure-vote.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: azure-vote
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: REDIS
              value: {{ .Values.redis.host | quote }}
            - name: REDIS_PWD
              valueFrom:
                secretKeyRef:
                  name: {{ include "azure-vote.fullname" . }}-secret
                  key: redis-password
            - name: TITLE
              value: {{ .Values.app.title | quote }}
            - name: VOTE1VALUE
              value: {{ .Values.app.vote1 | quote }}
            - name: VOTE2VALUE
              value: {{ .Values.app.vote2 | quote }}
            - name: SHOWHOST
              value: {{ .Values.app.showHost | quote }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
