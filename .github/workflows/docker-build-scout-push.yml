name: CI - Build, Scout & Push

on:
  push:
    branches:
      - main

jobs:
  build-scout-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/voting-app:${{ github.sha }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/voting-app:latest \
            ./azure-vote

      - name: Push Docker image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/voting-app:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/voting-app:latest

      - name: Docker Scout - Analyse des vulnérabilités
        uses: docker/scout-action@v1
        with:
          command: cves
          image: registry://${{ secrets.DOCKERHUB_USERNAME }}/voting-app:${{ github.sha }}
          only-severities: critical,high
          exit-code: false
