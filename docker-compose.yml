services:
  redis:
    image: redis
    command: redis-server --requirepass 1234
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "1234", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  azure-vote:
    build: ./azure-vote
    ports:
      - "8080:80"
    environment:
      - REDIS=redis
      - REDIS_PWD=1234
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
